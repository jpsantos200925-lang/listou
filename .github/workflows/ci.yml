name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit

      - name: Check Supabase type drift
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF não definido — pulando verificação de drift"
            exit 0
          fi
          npx --yes supabase gen types typescript --project-id "$SUPABASE_PROJECT_REF" > /tmp/supabase-fresh.ts
          diff src/types/supabase.ts /tmp/supabase-fresh.ts || \
            (echo "❌ src/types/supabase.ts desatualizado. Execute: npm run gen:types" && exit 1)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage
